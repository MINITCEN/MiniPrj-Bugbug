<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>버그버그 - 의뢰 등록</title>
    <link rel="stylesheet" href="/css/common-layout.css">
    <link rel="stylesheet" href="/css/login.css">
    <link rel="stylesheet" th:href="@{/css/requestForm.css}">
</head>

<body>
<script th:src="@{https://dapi.kakao.com/v2/maps/sdk.js(appkey=${kakaoMapKey},libraries='services',autoload=false)}"></script>
<div th:replace="~{fragments/header :: siteHeader('none')}"></div>
<main class="container">
    <div class="page-title">
        <h1>의뢰 등록하기</h1>
        <p>헌터에게 요청할 벌레 퇴치 의뢰 내용을 자세히 작성해주세요.</p>
    </div>

    <form class="form-card"
          method="post"
          action="/api/requestView/new"
          enctype="multipart/form-data">

        <h2 class="section-title">의뢰 정보 입력</h2>

        <div class="form-grid">

            <div class="form-group full">
                <label>제목 <span class="required">*</span></label>
                <input type="text"
                       name="title"
                       placeholder="예: 주방에 바퀴벌레가 나타났어요!"
                       required>
            </div>

            <div class="form-group">
                <label>진행 상태<span class="required">*</span></label>
                <select name="status">
                    <option value = "" selected></option>
                    <option value="예약 중">예약 중</option>
                    <option value="완료">완료</option>
                </select>
                <label>난이도 <span class="required">*</span></label>
                <select name="difficulty" id="difficulty" required>
                    <option value="">난이도를 선택하세요</option>
                    <option value="EASY">쉬움</option>
                    <option value="NORMAL">보통</option>
                    <option value="HARD">어려움</option>
                </select>
                <span class="hint">높은 난이도를 완수할수록 더 높은 헌터 등급에 도달할 수 있습니다.</span>
            </div>

            <div class="form-group full">
                <label> 대략적인 위치 <span class="required">*</span></label>

                <div class="location-search-box">
                    <input type="text"
                           id="location"
                           name="location"
                           placeholder="예: 서울 강남구 역삼동"
                           required>

                    <button type="button" onclick="searchAddress()">
                        위치 검색
                    </button>
                </div>

                <div id="map" class="map-box"></div>

                <input type="hidden" id="latitude" name="latitude">
                <input type="hidden" id="longitude" name="longitude">

                <p id="selectedLocation" class="hint">
                    위치를 검색하면 지도에 표시됩니다.
                </p>
            </div>
            <div class="form-group full">
                <div class="detail-row full">
                    <label>상세 내용 <span class="required">*</span></label>

                    <div class="content-editor-box">
                        <div class="upload-toolbar">
                            <label for="imageFiles" class="upload-file-btn">🖼 이미지</label>
                            <label for="videoFile" class="upload-file-btn">🎥 동영상</label>
                        </div>

                        <article id="contentEditor"
                                 class="content-editor"
                                 contenteditable="true"
                                 data-placeholder="벌레가 나온 위치, 크기, 개체 수, 현재 상황 등을 자세히 작성해주세요.
    --------------------------------------------------------------------
    ※ 작성 예시: 바퀴벌레가 나타났어요!!! 크기는 대략 5cm이고 1마리에요. 10분 전쯤 발견했어요!!!"></article>

                        <input type="hidden"
                               id="contentHidden"
                               name="content">

                        <input type="file"
                               id="imageFiles"
                               name="imageFiles"
                               accept="image/*"
                               multiple
                               hidden>

                        <input type="file"
                               id="videoFile"
                               name="videoFile"
                               accept="video/*"
                               hidden>

                        <div id="previewContainer" class="preview-container"></div>
                    </div>
                </div>

                <div class="detail-input-box">
                    <div class="detail-row">
                        <label>발생 위치</label>
                        <input type="text"
                               name="occurrencePlace"
                               placeholder="예: 주방 싱크대 근처"
                               required>
                    </div>
                    <div class="detail-row">
                        <label>벌레 종류 <span class="small-text">(추정)</span></label>
                        <input type="text"
                               name="bugType"
                               placeholder="예: 바퀴벌레, 거미"
                               required>
                    </div>
                    <div class="detail-row">
                        <label>크기</label>
                        <input type="text"
                               name="bugSize"
                               placeholder="예: 3~4cm 정도">
                    </div>
                    <div class="detail-row">
                        <label>발생 시간</label>
                        <input type="datetime-local"
                               name="occurrenceTime">
                    </div>
                    <div class="detail-row full">
                        <label>추가 설명</label>
                        <textarea name="additionalDescription"
                                  placeholder="예: 한 마리만 봤고, 더 있는지는 모르겠어요. 잡아주신 후 청소나 처리가 부탁드려요."
                                  required></textarea>
                    </div>
                </div>
            </div>

        </div>

        <div class="notice-box">
            <strong>작성 안내</strong><br>
            허위 의뢰나 장난성 글은 관리자에 의해 삭제될 수 있습니다.<br>
            작성자 정보는 로그인한 사용자 기준으로 자동 저장되며, 화면에서는 직접 입력하지 않습니다.<br>
            등록 후 상태는 기본적으로 <strong>예약 중</strong> 또는 <strong>완료</strong> 상태로 저장하는 것이 좋습니다.
        </div>

        <div class="button-area">
            <button type="submit" class="btn submit-btn">의뢰 등록</button>
            <button type="reset" class="btn reset-btn">다시 작성</button>
            <a href="/api/requestView/list" class="btn cancel-btn">목록으로</a>
        </div>

    </form>

</main>
<div th:replace="~{fragments/footer :: siteFooter()}"></div>
<script src="/js/common-layout.js"></script>
<script src="/js/login.js"></script>
<script>
    function showFileName(input, previewId) {
        const preview = document.getElementById(previewId);

        if (!input.files || input.files.length === 0) {
            preview.textContent = "선택된 파일이 없습니다.";
            return;
        }

        const names = Array.from(input.files)
            .map(file => file.name)
            .join(", ");

        preview.textContent = names;
    }

    let map = null;
    let marker = null;
    let geocoder = null;

    function initMap() {
        const mapContainer = document.getElementById("map");

        if (!mapContainer) {
            return;
        }

        const mapOption = {
            center: new kakao.maps.LatLng(37.5665, 126.9780),
            level: 4
        };

        map = new kakao.maps.Map(mapContainer, mapOption);
        geocoder = new kakao.maps.services.Geocoder();
    }

    if (typeof kakao !== "undefined" && kakao.maps) {
        kakao.maps.load(function () {
            initMap();
        });
    } else {
        console.error("카카오 지도 SDK가 로딩되지 않았습니다. JavaScript 키와 도메인 설정을 확인하세요.");
    }

    function searchAddress() {
        const locationInput = document.getElementById("location");
        const address = locationInput.value.trim();

        if (address === "") {
            alert("위치를 입력해주세요.");
            locationInput.focus();
            return;
        }

        if (!geocoder) {
            alert("지도 API가 아직 초기화되지 않았습니다. JavaScript 키와 localhost 도메인 등록을 확인해주세요.");
            return;
        }

        geocoder.addressSearch(address, function (result, status) {
            if (status === kakao.maps.services.Status.OK) {
                const latitude = result[0].y;
                const longitude = result[0].x;

                const coords = new kakao.maps.LatLng(latitude, longitude);

                map.setCenter(coords);

                if (marker) {
                    marker.setMap(null);
                }

                marker = new kakao.maps.Marker({
                    map: map,
                    position: coords
                });

                document.getElementById("latitude").value = latitude;
                document.getElementById("longitude").value = longitude;

                document.getElementById("selectedLocation").textContent =
                    "선택 위치: " + address + " / 위도: " + latitude + ", 경도: " + longitude;
            } else {
                alert("주소를 찾을 수 없습니다. 예: 서울 강남구 역삼동 형식으로 입력해보세요.");
            }
        });
    }
    const requestForm = document.querySelector(".form-card");
    const contentEditor = document.getElementById("contentEditor");
    const contentHidden = document.getElementById("contentHidden");
    const imageInput = document.getElementById("imageFiles");
    const videoInput = document.getElementById("videoFile");
    const previewContainer = document.getElementById("previewContainer");

    if (requestForm && contentEditor && contentHidden) {
        requestForm.addEventListener("submit", function (event) {
            const contentText = contentEditor.innerText.trim();

            if (contentText.length === 0) {
                event.preventDefault();
                alert("상세 내용을 입력해주세요.");
                contentEditor.focus();
                return;
            }

            contentHidden.value = contentText;
        });
    }

    if (imageInput) {
        imageInput.addEventListener("change", function () {
            refreshImagePreview();
        });
    }

    if (videoInput) {
        videoInput.addEventListener("change", function () {
            refreshVideoPreview();
        });
    }

    function refreshImagePreview() {
        removePreviewByType("image");

        const files = Array.from(imageInput.files);

        files.forEach((file, index) => {
            if (!file.type.startsWith("image/")) {
                alert("이미지 파일만 첨부할 수 있습니다.");
                return;
            }

            const reader = new FileReader();

            reader.onload = function (e) {
                const previewBox = document.createElement("div");
                previewBox.className = "preview-box";
                previewBox.dataset.type = "image";

                const img = document.createElement("img");
                img.src = e.target.result;
                img.className = "preview-img";

                const removeBtn = document.createElement("button");
                removeBtn.type = "button";
                removeBtn.className = "remove-file-btn";
                removeBtn.textContent = "×";

                removeBtn.addEventListener("click", function () {
                    removeImageFile(index);
                });

                previewBox.appendChild(img);
                previewBox.appendChild(removeBtn);
                previewContainer.appendChild(previewBox);
            };

            reader.readAsDataURL(file);
        });
    }

    function removeImageFile(removeIndex) {
        const dt = new DataTransfer();
        const files = Array.from(imageInput.files);

        files.forEach((file, index) => {
            if (index !== removeIndex) {
                dt.items.add(file);
            }
        });

        imageInput.files = dt.files;
        refreshImagePreview();
    }

    function refreshVideoPreview() {
        removePreviewByType("video");

        const file = videoInput.files[0];

        if (!file) {
            return;
        }

        if (!file.type.startsWith("video/")) {
            alert("동영상 파일만 첨부할 수 있습니다.");
            videoInput.value = "";
            return;
        }

        const videoUrl = URL.createObjectURL(file);

        const previewBox = document.createElement("div");
        previewBox.className = "preview-box";
        previewBox.dataset.type = "video";
        previewBox.dataset.objectUrl = videoUrl;

        const video = document.createElement("video");
        video.src = videoUrl;
        video.className = "preview-video";
        video.controls = true;

        const removeBtn = document.createElement("button");
        removeBtn.type = "button";
        removeBtn.className = "remove-file-btn";
        removeBtn.textContent = "×";

        removeBtn.addEventListener("click", function () {
            videoInput.value = "";
            URL.revokeObjectURL(videoUrl);
            previewBox.remove();
        });

        previewBox.appendChild(video);
        previewBox.appendChild(removeBtn);
        previewContainer.appendChild(previewBox);
    }

    function removePreviewByType(type) {
        const previews = previewContainer.querySelectorAll(`[data-type="${type}"]`);

        previews.forEach(preview => {
            if (preview.dataset.objectUrl) {
                URL.revokeObjectURL(preview.dataset.objectUrl);
            }

            preview.remove();
        });
    }

</script>

</body>
</html>
