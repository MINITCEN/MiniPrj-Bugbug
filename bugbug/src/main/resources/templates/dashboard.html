<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>버그버그 - 마이페이지</title>
    <style>
        .dashboard-section { border: 1px solid #ddd; padding: 15px; margin-bottom: 20px; border-radius: 8px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; }
        .more-btn { text-decoration: none; color: #4CAF50; font-weight: bold; }
    </style>
</head>
<body>

<h1>마이페이지 대시보드</h1>

<div class="dashboard-section">
    <h2>기본 정보</h2>
    <p>이름(닉네임): <span th:text="${user.nickname}">홍길동</span></p>
    <p>이메일: <span th:text="${user.email}">example@email.com</span></p>
    <p>전화번호: <span th:text="${user.phoneNumber}">010-0000-0000</span></p>
    <p>주소: <span th:text="${user.address}">서울시 강남구...</span></p>
</div>

<div class="dashboard-section">
    <div class="section-header">
        <h2>최근 나의 의뢰</h2>
        <a href="/mypage/requests" class="more-btn">더보기 ></a>
    </div>
    <ul id="my-requests-list">
        <li>데이터를 불러오는 중입니다...</li>
    </ul>
</div>

<div class="dashboard-section">
    <div class="section-header">
        <h2>나의 리뷰 관리</h2>
        <a href="/mypage/reviews" class="more-btn">더보기 ></a>
    </div>
    <ul id="my-reviews-list">
        <li>데이터를 불러오는 중입니다...</li>
    </ul>
</div>

<div class="dashboard-section">
    <div class="section-header">
        <h2>최근 찜한 헌터</h2>
        <a href="/mypage/bookmarks/hunters" class="more-btn">더보기 ></a>
    </div>
    <ul id="my-bookmarks-list">
        <li>데이터를 불러오는 중입니다...</li>
    </ul>
</div>

<div th:if="${user.role == 'HUNTER'}" class="dashboard-section" style="background-color: #f4fcf4;">
    <div class="section-header">
        <h2>[헌터 전용] 최근 수행한 의뢰</h2>
        <a href="/mypage/hunter/tasks" class="more-btn">더보기 ></a>
    </div>
    <ul id="hunter-tasks-list">
        <li>데이터를 불러오는 중입니다...</li>
    </ul>
</div>


<script>
    document.addEventListener("DOMContentLoaded", function() {

        // 1. 나의 의뢰 가져오기
        fetch('/api/mypage/requests?size=3')
            .then(res => res.json())
            .then(data => {
                const listEl = document.getElementById('my-requests-list');
                listEl.innerHTML = '';
                if(data.content.length === 0) {
                    listEl.innerHTML = '<li>최근 등록한 의뢰가 없습니다.</li>';
                    return;
                }
                data.content.forEach(req => {
                    listEl.innerHTML += `<li>[${req.status}] ${req.title}</li>`;
                });
            });

        // ⭐ 2. [추가됨] 나의 리뷰 가져오기
        fetch('/api/mypage/reviews?size=3')
            .then(res => res.json())
            .then(data => {
                const listEl = document.getElementById('my-reviews-list');
                listEl.innerHTML = '';
                if(data.content.length === 0) {
                    listEl.innerHTML = '<li>작성한 리뷰가 없습니다.</li>';
                    return;
                }
                data.content.forEach(review => {
                    // 별점과 리뷰 내용을 보여줍니다.
                    listEl.innerHTML += `<li>${review.hunterName} 헌터님께 - ⭐${review.rating}점 : ${review.content}</li>`;
                });
            });

        // 3. 찜한 헌터 가져오기
        fetch('/api/mypage/bookmarks/hunters?size=3')
            .then(res => res.json())
            .then(data => {
                const listEl = document.getElementById('my-bookmarks-list');
                listEl.innerHTML = '';
                if(data.content.length === 0) {
                    listEl.innerHTML = '<li>찜한 헌터가 없습니다.</li>';
                    return;
                }
                data.content.forEach(hunter => {
                    listEl.innerHTML += `<li>${hunter.name} 헌터 (평점: ${hunter.rating}점)</li>`;
                });
            });

        // 4. 헌터 수행 내역 가져오기
        const hunterTaskListEl = document.getElementById('hunter-tasks-list');
        if (hunterTaskListEl) {
            fetch('/api/mypage/hunter/tasks?size=3')
                .then(res => res.json())
                .then(data => {
                    hunterTaskListEl.innerHTML = '';
                    if(data.content.length === 0) {
                        hunterTaskListEl.innerHTML = '<li>최근 수행한 의뢰가 없습니다.</li>';
                        return;
                    }
                    data.content.forEach(task => {
                        hunterTaskListEl.innerHTML += `<li>[완료] ${task.requestTitle}</li>`;
                    });
                });
        }
    });
</script>

</body>
</html>
