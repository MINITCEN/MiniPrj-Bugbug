# Application Name
spring.application.name=bugbug

# ---------------------------------------------------------
# [Database & JPA] - Local Development (H2)
# ---------------------------------------------------------
# H2 Console (http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# DataSource (Memory DB)
spring.datasource.url=jdbc:h2:mem:bugbugdb;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# hibernate 실행 후 sql 실행 (필수)
spring.jpa.defer-datasource-initialization=true
# sql 초기화 (h2쓰면 삭제해도 상관무)
spring.sql.init.mode=always

# ---------------------------------------------------------
# [File Upload] - For Request Images
# ---------------------------------------------------------
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ---------------------------------------------------------
# [View Engine] - Thymeleaf
# ---------------------------------------------------------
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# ---------------------------------------------------------
# [Security & Session]
# ---------------------------------------------------------
server.servlet.session.timeout=30m
# spring.security.user.password=1234 (Optional test password)

# api 키
SEOUL.API.KEY=${SEOUL_API_KEY}
KAKAO.API.KEY=${KAKAO_API_KEY}
kma.api.base-url=https://apis.data.go.kr/1360000/VilageFcstInfoService_2.0
kma.api.key=${KMA_API_KEY}
