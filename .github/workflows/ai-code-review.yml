name: Antigravity AI Code Reviewer

on:
  pull_request:
    types: [opened, synchronize]
    branches: [ dev ] # dev 브랜치로 날아오는 PR만 감시
    paths:
      - 'src/main/java/**/*.java' # 자바 소스 파일 변경 시에만 가동 (토큰 절약)

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true # 새 커밋이 올라오면 이전 AI 분석을 즉시 취소하여 계정 보호

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # 깃허브 PR 창에 AI가 직접 댓글을 달아야 하므로 쓰기 권한 필수

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get code diff
        run: |
          # dev 브랜치 대비 이번에 수정/추가된 자바 코드 줄만 쏙 골라내기
          git diff origin/${{ github.base_ref }} HEAD -- 'src/main/java/**/*.java' > diff.txt

      - name: Install Antigravity CLI
        run: |
          curl -fsSL https://antigravity.google/cli/install.sh | bash
          echo "$HOME/.antigravity/bin" >> $GITHUB_PATH

      - name: Run Antigravity Code Review
        env:
          ANTIGRAVITY_API_KEY: ${{ secrets.ANTIGRAVITY_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -s diff.txt ]; then
            antigravity review \
              --diff ./diff.txt \
              --prompt "너는 Java 17, Spring Boot, Spring Data JPA, MySQL DB, Thymeleaf를 사용하는 프로젝트의 매우 깐깐한 시니어 백엔드 아키텍트야. 이번 PR로 변경된 자바 코드를 소나큐브 스타일로 정밀 검수하되, 반드시 다음 사항을 최우선으로 지적해줘:
              1. [Spring Data JPA / MySQL] 연관관계 매핑 시 FetchType.EAGER 오용 및 N+1 문제 유발 코드 감지, @Transactional 선언 누락으로 인한 영속성 컨텍스트(Dirty Checking) 작동 불가 오류 검사, MySQL 성능 저하를 일으킬 수 있는 비효율적인 분산 쿼리 로직 지적.
              2. [Thymeleaf / Controller] @Controller에서 Model 객체에 데이터를 바인딩할 때 속성명(Key) 누락이나 오타로 인해 타임리프 렌더링 에러(TemplateInputException 등)를 유발할 가능성이 있는지 검사, 뷰 리턴 경로의 적절성 체크.
              3. [Java / Clean Code] 가독성이 떨어지는 복잡한 nested if-else문을 Early Return 구조로 리팩토링 유도, 자바 예외 처리(Try-Catch) 누락 및 적절한 HTTP 상태 코드 반환 여부 검사.
              지적할 때는 발견된 문제점, 이유, 그리고 '개선된 Java 코드 예시'를 마크다운 형식으로 포함하여 냉철하게 한글로 리뷰 댓글을 달아줘." \
              --format github
          else
            echo "리뷰할 자바 변경 사항이 없습니다."
          fi