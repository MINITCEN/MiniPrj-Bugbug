name: Antigravity AI Code Reviewer

on:
  pull_request:
    types: [opened, synchronize]
    branches: [ dev ]
    paths:
      - 'bugbug/src/main/java/**/*.java'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Get code diff
        run: |
          git diff origin/${{ github.base_ref }} HEAD -- 'bugbug/src/main/java/**/*.java' > diff.txt

      - name: Run Google Gemini Reviewer
        if: success()
        env:
          # 레포지토리 Settings -> Secrets에 등록한 내 유료 계정 키
          GEMINI_API_KEY: ${{ secrets.ANTIGRAVITY_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -s diff.txt ]; then
            # 1. npm 404 에러를 피하기 위해 리눅스용 reviewdog 바이너리를 직접 다운로드 및 설치
            curl -sfL https://raw.githubusercontent.com/reviewdog/reviewdog/master/install.sh | sh -s -- -b ./bin
          
            # 2. 내장된 바이너리로 직접 실행 (npx 차단)
            ./bin/reviewdog \
              -name="Gemini-AI-Architect" \
              -f=diff \
              -f.diff.strip=0 \
              -reporter=github-pr-review \
              -filter-mode=added \
              -level=warning \
              -fail-on-error=false \
              -prompt="너는 Java 17, Spring Boot, Spring Data JPA, MySQL DB, Thymeleaf를 사용하는 프로젝트의 매우 깐깐한 시니어 백엔드 아키텍트야. 이번 PR로 변경된 자바 코드를 소나큐브 스타일로 정밀 검수하되, 반드시 다음 사항을 최우선으로 지적해줘:
              1. [Spring Data JPA / MySQL] 연관관계 매핑 시 FetchType.EAGER 오용 및 N+1 문제 유발 코드 감지, @Transactional 선언 누락으로 인한 영속성 컨텍스트(Dirty Checking) 작동 불가 오류 검사, MySQL 성능 저하를 일으킬 수 있는 비효율적인 분산 쿼리 로직 지적.
              2. [Thymeleaf / Controller] @Controller에서 Model 객체에 데이터를 바인딩할 때 속성명(Key) 누락이나 오타로 인해 타임리프 렌더링 에러(TemplateInputException 등)를 유발할 가능성이 있는지 검사, 뷰 리턴 경로의 적절성 체크.
              3. [Java / Clean Code] 가독성이 떨어지는 복잡한 nested if-else문을 Early Return 구조로 리팩토링 유도, 자바 예외 처리(Try-Catch) 누락 및 적절한 HTTP 상태 코드 반환 여부 검사.
              지적할 때는 발견된 문제점, 이유, 그리고 '개선된 Java 코드 예시'를 마크다운 형식으로 포함하여 냉철하게 한글로 리뷰 댓글을 달아줘." < diff.txt
          else
            echo "리뷰할 자바 변경 사항이 없습니다."
          fi