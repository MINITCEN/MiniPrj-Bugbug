name: Antigravity AI Code Reviewer

on:
  pull_request:
    types: [opened, synchronize]
    branches: [ dev ]
    paths:
      - 'bugbug/src/main/java/**/*.java'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write # PR에 댓글을 달기 위해 반드시 필요

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Get code diff
        run: |
          git diff origin/${{ github.base_ref }} HEAD -- 'bugbug/src/main/java/**/*.java' > diff.txt

      - name: Run Google Gemini Reviewer
        if: success()
        env:
          GEMINI_API_KEY: ${{ secrets.ANTIGRAVITY_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -s diff.txt ]; then
            DIFF_CONTENT=$(cat diff.txt)
            PROMPT_TEXT="너는 Java 17, Spring Boot, Spring Data JPA, MySQL DB, Thymeleaf를 사용하는 프로젝트의 매우 깐깐한 시니어 백엔드 아키텍트야. 다음 변경된 자바 코드(diff)를 소나큐브 스타일로 정밀 검수하되, 반드시 다음 사항을 최우선으로 지적해줘:
            1. [Spring Data JPA / MySQL] 연관관계 매핑 시 FetchType.EAGER 오용 및 N+1 문제 유발 코드 감지, @Transactional 선언 누락으로 인한 영속성 컨텍스트(Dirty Checking) 작동 불가 오류 검사, MySQL 성능 저하를 일으킬 수 있는 비효율적인 분산 쿼리 로직 지적.
            2. [Thymeleaf / Controller] @Controller에서 Model 객체에 데이터를 바인딩할 때 속성명(Key) 누락이나 오타로 인해 타임리프 렌더링 에러(TemplateInputException 등)를 유발할 가능성이 있는지 검사, 뷰 리턴 경로의 적절성 체크.
            3. [Java / Clean Code] 가독성이 떨어지는 복잡한 nested if-else문을 Early Return 구조로 리팩토링 유도, 자바 예외 처리(Try-Catch) 누락 및 적절한 HTTP 상태 코드 반환 여부 검사.
            지적할 때는 발견된 문제점, 이유, 그리고 '개선된 Java 코드 예시'를 마크다운 형식으로 포함하여 냉철하게 한글로 리뷰 댓글을 달아줘.
          
            리뷰 대상 코드:
            $DIFF_CONTENT"

            # 1. 제미나이 1.5 프로 모델 호출
            RESPONSE=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${GEMINI_API_KEY}" \
              -H "Content-Type: application/json" \
              -d "$(jq -n --arg msg "$PROMPT_TEXT" '{contents: [{parts: [{text: $msg}]}]}')")

            # 2. 결과 텍스트 추출 및 검증
            AI_COMMENT=$(echo "$RESPONSE" | jq -r '.candidates[0].content.parts[0].text')
          
            if [ "$AI_COMMENT" = "null" ] || [ -z "$AI_COMMENT" ]; then
              echo "AI 응답을 받지 못했습니다. API 키나 쿼리 한도를 확인하세요."
              exit 1
            fi

            # 3. 깃허브 공식 API를 사용하여 PR에 리뷰 댓글 통째로 등록하기 (파싱 에러 원천 차단)
            # 대화(Conversation) 탭에 종합 의견 형태로 이쁘게 박힘
            COMMENT_BODY="### 🤖 Antigravity AI Code Review Result
            $AI_COMMENT"

            curl -s -X POST "https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/reviews" \
              -H "Authorization: token ${GITHUB_TOKEN}" \
              -H "Accept: application/vnd.github.v3+json" \
              -d "$(jq -n --arg body "$COMMENT_BODY" '{body: $body, event: "COMMENT"}')"
          else
            echo "리뷰할 자바 변경 사항이 없습니다."
          fi